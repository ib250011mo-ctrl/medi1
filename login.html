<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | メディスポット</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="medispot.css" rel="stylesheet">

  <style>
    /* ── PAGE LAYOUT ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── PAGE HERO ── */
    .login-hero {
      background: var(--teal-light);
      padding: 48px 24px 40px;
      text-align: center;
    }
    .login-hero h1 {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .login-hero p {
      font-size: 14px;
      color: #27496b;
    }

    /* ── CONTAINER ── */
    .login-container {
      max-width: 480px;
      margin: 40px auto 60px;
      padding: 0 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── CARD ── */
    .login-card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 14px 40px rgba(31,58,95,0.09);
      padding: 36px 40px;
    }

    /* ── FIELD ── */
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 7px;
      letter-spacing: 0.02em;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d0dde8;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--navy);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(62,150,144,0.12);
    }

    /* ── ERROR ── */
    .form-error {
      display: none;
      background: #fdf0f0;
      border: 1px solid #f5c6c6;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 18px;
    }
    .form-error.show { display: block; }

    /* ── BUTTON ── */
    .btn-login {
      display: block;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: var(--teal);
      color: #fff;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(62,150,144,0.3);
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── REGISTER HINT ── */
    .register-hint {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 18px;
    }
    .register-hint a {
      color: var(--teal);
      font-weight: 700;
      text-decoration: none;
    }

    /* ── DEMO CARD ── */
    .demo-card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 14px 40px rgba(31,58,95,0.09);
      padding: 28px 40px;
    }
    .demo-card-title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .demo-card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .btn-demo {
      background: var(--paper);
      border: 1.5px solid #d0dde8;
      border-radius: 12px;
      padding: 14px 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      text-align: center;
      line-height: 1.6;
    }
    .btn-demo:hover {
      border-color: var(--teal);
      background: rgba(157,213,208,0.15);
      transform: translateY(-1px);
    }
    .btn-demo .sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      display: block;
      margin-top: 2px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .login-card, .demo-card { padding: 28px 20px; }
      .login-hero h1 { font-size: 22px; }
    }
  </style>
</head>
<body class="login-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="logo-mark">
          <span class="logo-v"></span>
          <span class="logo-h"></span>
        </span>
        <span class="brand-name">メディスポット</span>
      </a>
      <nav class="main-nav">
        <a href="index.html">サービス紹介</a>
        <a href="register.html">新規会員登録</a>
        <a href="login.html" class="nav-btn active">ログイン</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <div class="login-hero">
    <h1>ログイン</h1>
    <p>ログイン後、権限に応じたマイページへ移動します</p>
  </div>

  <!-- MAIN -->
  <div class="login-container">

    <!-- LOGIN FORM -->
    <form class="login-card" onsubmit="return doLogin(event)">
      <p class="form-error" id="err">メールアドレスまたはパスワードが正しくありません。</p>

      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="fEmail" placeholder="example@example.com" required autocomplete="username">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="fPassword" placeholder="パスワードを入力" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login">ログイン</button>

      <p class="register-hint">
        アカウントをお持ちでない方は
        <a href="register.html">新規会員登録</a>
      </p>
    </form>

    <!-- DEMO CARD -->
    <div class="demo-card">
      <div class="demo-card-title">🔑 デモアカウントでログイン</div>
      <p class="demo-card-desc">プロトタイプ確認用のアカウントです。ワンクリックでログインできます。</p>
      <div class="demo-grid">
        <button class="btn-demo" onclick="demoLogin('seeker@example.com')">
          👤 求職者
          <span class="sub">佐藤 花子 ／ 看護師</span>
        </button>
        <button class="btn-demo" onclick="demoLogin('employer@example.com')">
          🏥 求人者
          <span class="sub">ブランチ総合クリニック</span>
        </button>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="brand">
        <span class="logo-mark footer-logo">
          <span class="logo-v"></span>
          <span class="logo-h"></span>
        </span>
        <span class="brand-name light">メディスポット</span>
      </div>
      <p class="footer-text">
        医療特化型広告マッチングシステム プロトタイプ V1<br>
        <a href="#" onclick="resetDB();return false;">デモデータを初期化</a>
      </p>
    </div>
  </footer>

  <script src="assets/app.js"></script>
  <script>
    renderHeader('login.html');
    renderFooter();

    function redirect(user) {
      location.href = user.role === 'seeker' ? 'seeker-home.html' : 'employer-home.html';
    }

    function doLogin(e) {
      e.preventDefault();
      const user = login(
        document.getElementById('fEmail').value.trim(),
        document.getElementById('fPassword').value
      );
      if (user) {
        redirect(user);
      } else {
        document.getElementById('err').classList.add('show');
      }
      return false;
    }

    function demoLogin(email) {
      const user = login(email, 'demo1234');
      if (user) redirect(user);
    }
  </script>
</body>
</html>
