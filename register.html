<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-light: #9DD5D0;
    --teal:       #3E9690;
    --navy:       #1F3A5F;
    --paper:      #F4F8F7;
    --white:      #FFFFFF;
    --text-muted: #5a6b80;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans JP',sans-serif;color:var(--navy);background:var(--paper);line-height:1.9;font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  a{text-decoration:none;color:inherit}
  input,select{font-family:'Noto Sans JP',sans-serif}
</style>
</helmet>

<!-- HEADER -->
<header style="position:sticky;top:0;z-index:50;background:rgba(244,248,247,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(31,58,95,.08)">
  <div style="max-width:1200px;margin:0 auto;padding:0 40px;height:68px;display:flex;align-items:center;justify-content:space-between">
    <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none">
      <!-- Logo dấu cộng -->
      <span style="position:relative;width:34px;height:34px;display:inline-block;flex:none">
        <span style="position:absolute;left:10px;top:0;width:14px;height:34px;background:var(--teal);border-radius:5px"></span>
        <span style="position:absolute;left:0;top:10px;width:34px;height:14px;background:var(--teal-light);border-radius:5px"></span>
      </span>
      <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:20px;color:var(--navy)">メディスポット</span>
    </a>
    <nav style="display:flex;align-items:center;gap:8px">
      <a href="index.html" style="font-size:15px;font-weight:500;color:var(--navy);padding:8px 14px;border-radius:10px;text-decoration:none">サービス紹介</a>
      <a href="register.html" style="font-size:15px;font-weight:700;color:var(--navy);padding:8px 14px;border-radius:10px;background:rgba(157,213,208,0.35);text-decoration:none">新規会員登録</a>
      <a href="login.html" style="font-size:15px;font-weight:700;color:#fff;background:var(--teal);padding:9px 20px;border-radius:10px;text-decoration:none">ログイン</a>
    </nav>
  </div>
</header>

<!-- PAGE HEADER -->
<section style="position:relative;background:linear-gradient(105deg,var(--teal) 0%,#4eb0aa 55%,var(--teal-light) 100%);overflow:hidden;text-align:center;padding:54px 32px 50px">
  <div style="position:absolute;right:8%;top:50%;transform:translateY(-50%);width:240px;height:240px;border-radius:50%;background:radial-gradient(circle at 38% 35%,rgba(255,255,255,.22),rgba(255,255,255,0) 62%)"></div>
  <div style="position:relative">
    <p style="font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.18em;color:rgba(255,255,255,.85);margin-bottom:8px">JOIN MEDISPOT</p>
    <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:30px;color:#fff;letter-spacing:.06em;margin-top:2px">新規会員登録</h1>
    <p style="font-size:14px;color:rgba(255,255,255,.88);margin-top:10px">登録種別を選択して、必要事項を入力してください。</p>
  </div>
</section>

<!-- MAIN -->
<main style="flex:1;max-width:560px;width:100%;margin:46px auto 56px;padding:0 24px">

  <!-- ROLE SELECT -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px">
    <button type="button" onClick="{{ selectSeeker }}" style="{{ seekerCardStyle }}">
      <span style="font-size:28px;line-height:1">👤🩺</span>
      <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;color:var(--navy)">求職者として登録</span>
      <span style="font-size:11px;color:var(--text-muted);line-height:1.55">医療資格者（看護師・検査技師・リハビリ職 など）</span>
    </button>
    <button type="button" onClick="{{ selectEmployer }}" style="{{ employerCardStyle }}">
      <span style="font-size:28px;line-height:1">🏥</span>
      <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;color:var(--navy)">求人者として登録</span>
      <span style="font-size:11px;color:var(--text-muted);line-height:1.55">医療機関（病院・クリニック・薬局 など）</span>
    </button>
  </div>

  <!-- FORM -->
  <form style="background:#fff;border:1px solid rgba(31,58,95,.07);border-radius:22px;padding:36px 32px;box-shadow:0 14px 40px rgba(31,58,95,.08)" onsubmit="return false">

    <!-- お名前 (共通) -->
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">お名前（ご担当者名）<span style="color:#e05252;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
      <input type="text" placeholder="例）佐藤 花子"
        style="width:100%;padding:12px 14px;border:1.5px solid #d0dde8;border-radius:10px;font-size:14px;color:var(--navy);background:#fff"
        style-focus="outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(62,150,144,.12)">
    </div>

    <!-- EMPLOYER ONLY -->
    <sc-if value="{{ isEmployer }}" hint-placeholder-val="{{ false }}">
      <div style="margin-bottom:8px">
        <p style="font-size:12px;font-weight:700;letter-spacing:0.1em;color:var(--teal);border-bottom:1.5px solid var(--teal-light);padding-bottom:8px;margin-bottom:18px">医療機関情報</p>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">医療機関名<span style="color:#e05252;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
        <input type="text" placeholder="例）ブランチ総合クリニック"
          style="width:100%;padding:12px 14px;border:1.5px solid #d0dde8;border-radius:10px;font-size:14px;color:var(--navy);background:#fff"
          style-focus="outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(62,150,144,.12)">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">施設区分</label>
        <select style="width:100%;padding:12px 14px;border:1.5px solid #d0dde8;border-radius:10px;font-size:14px;color:var(--navy);background:#fff;appearance:none"
          style-focus="outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(62,150,144,.12)">
          <option>病院</option><option>クリニック（無床）</option><option>クリニック（有床）</option><option>調剤薬局</option><option>介護・福祉施設</option><option>健診センター</option><option>その他</option>
        </select>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">所在地</label>
        <input type="text" placeholder="例）東京都世田谷区〇〇1-2-3"
          style="width:100%;padding:12px 14px;border:1.5px solid #d0dde8;border-radius:10px;font-size:14px;color:var(--navy);background:#fff"
          style-focus="outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(62,150,144,.12)">
      </div>
    </sc-if>

    <!-- SEEKER ONLY -->
    <sc-if value="{{ isSeeker }}" hint-placeholder-val="{{ true }}">
      <div style="margin-bottom:8px">
        <p style="font-size:12px;font-weight:700;letter-spacing:0.1em;color:var(--teal);border-bottom:1.5px solid var(--teal-light);padding-bottom:8px;margin-bottom:18px">資格・職種情報</p>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">保有資格（職種）<span style="color:#e05252;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
        <select style="width:100%;padding:12px 14px;border:1.5px solid #d0dde8;border-radius:10px;font-size:14px;color:var(--navy);background:#fff;appearance:none"
          style-focus="outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(62,150,144,.12)">
          <option>看護師</option><option>准看護師</option><option>保健師</option><option>助産師</option><option>臨床検査技師</option><option>診療放射線技師</option><option>理学療法士（PT）</option><option>作業療法士（OT）</option><option>言語聴覚士（ST）</option><option>薬剤師</option><option>介護福祉士・ヘルパー</option><option>その他</option>
        </select>
      </div>
    </sc-if>

    <!-- アカウント情報 (共通) -->
    <div style="margin-bottom:8px">
      <p style="font-size:12px;font-weight:700;letter-spacing:0.1em;color:var(--teal);border-bottom:1.5px solid var(--teal-light);padding-bottom:8px;margin-bottom:18px">アカウント情報</p>
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">メールアドレス<span style="color:#e05252;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
      <input type="email" placeholder="例）example@example.com"
        style="width:100%;padding:12px 14px;border:1.5px solid #d0dde8;border-radius:10px;font-size:14px;color:var(--navy);background:#fff"
        style-focus="outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(62,150,144,.12)">
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px">パスワード<span style="color:#e05252;font-size:10px;margin-left:6px;font-weight:700">必須</span></label>
      <input type="password" placeholder="8文字以上"
        style="width:100%;padding:12px 14px;border:1.5px solid #d0dde8;border-radius:10px;font-size:14px;color:var(--navy);background:#fff"
        style-focus="outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(62,150,144,.12)">
      <p style="font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.6">※ プロトタイプのため、実際のパスワードは使用しないでください。</p>
    </div>

    <button type="submit" style="{{ submitStyle }}">この内容で登録する</button>

    <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:18px">
      すでにアカウントをお持ちの方は
      <a href="login.html" style="color:var(--teal);font-weight:700">ログイン</a>
    </p>
  </form>
</main>

<!-- FOOTER -->
<footer style="background:var(--navy);margin-top:auto">
  <div style="max-width:1200px;margin:0 auto;padding:48px 40px;display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="position:relative;width:34px;height:34px;display:inline-block;flex:none">
        <span style="position:absolute;left:10px;top:0;width:14px;height:34px;background:var(--teal-light);border-radius:5px"></span>
        <span style="position:absolute;left:0;top:10px;width:34px;height:14px;background:#fff;border-radius:5px"></span>
      </span>
      <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:18px;color:#fff">メディスポット</span>
    </div>
    <p style="font-size:13px;color:rgba(255,255,255,.6);text-align:right">
      医療特化型広告マッチングシステム プロトタイプ V1<br>
      <a href="#" style="color:var(--teal-light)">デモデータを初期化</a>
    </p>
  </div>
</footer>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { role: 'seeker' };

  componentDidMount() {
    const p = new URLSearchParams(location.search).get('role');
    if (p === 'employer' || p === 'seeker') this.setState({ role: p });
  }

  renderVals() {
    const role = this.state.role;
    const base = 'border-radius:16px;padding:22px 16px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;background:#fff;transition:all .18s;font-family:\'Noto Sans JP\',sans-serif;border:2px solid;';
    const seekerSel  = role === 'seeker';
    const empSel     = role === 'employer';
    return {
      role,
      isSeeker:       seekerSel,
      isEmployer:     empSel,
      selectSeeker:   () => this.setState({ role: 'seeker' }),
      selectEmployer: () => this.setState({ role: 'employer' }),
      seekerCardStyle: base + (seekerSel
        ? 'border-color:#3E9690;background:#f0f9f8;box-shadow:0 6px 18px rgba(62,150,144,.18);'
        : 'border-color:#d0dde8;'),
      employerCardStyle: base + (empSel
        ? 'border-color:#1F3A5F;background:#eef2f7;box-shadow:0 6px 18px rgba(31,58,95,.15);'
        : 'border-color:#d0dde8;'),
      submitStyle:
        'width:100%;padding:15px;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;font-family:\'Zen Maru Gothic\',sans-serif;cursor:pointer;transition:opacity .2s,transform .15s;'
        + (empSel
          ? 'background:#1F3A5F;box-shadow:0 6px 20px rgba(31,58,95,.28);'
          : 'background:#3E9690;box-shadow:0 6px 20px rgba(62,150,144,.3);'),
    };
  }
}
</script>
</body>
</html>
